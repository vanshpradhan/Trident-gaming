services:
  - type: web
    name: trident-gaming-cafe
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /api/health

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: TOKEN_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://trident-gaming-cafe.onrender.com
      # PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD must be added manually
      # from the free PostgreSQL service you create in the Render dashboard.
