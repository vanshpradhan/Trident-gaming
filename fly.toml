# fly.toml — Fly.io deployment config for Trident Gaming Café
# Docs: https://fly.io/docs/reference/configuration/

app = "trident-gaming-cafe"
primary_region = "sin"  # Singapore — closest to Jaigaon, West Bengal

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Keep always-on (no spin-down)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[statics]]
  guest_path = "/app/static"
  url_prefix = "/static"
