name: Keep-alive Ping Render Site

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from sleeping
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping website
        # The -s flag makes it silent, > /dev/null hides the output
        run: curl -s https://trident-gaming-cafe.onrender.com/ > /dev/null
