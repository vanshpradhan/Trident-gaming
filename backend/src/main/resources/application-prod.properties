# Production profile — activated by SPRING_PROFILES_ACTIVE=prod
# Render.com injects individual Postgres env vars when you attach a database.

# PostgreSQL connection (Render injects these automatically)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console in production
spring.h2.console.enabled=false

# Hide verbose error details in production
server.error.include-message=never
server.error.include-binding-errors=never
