# Production profile — activated by SPRING_PROFILES_ACTIVE=prod
# Render.com injects individual Postgres env vars when you attach a database.

# PostgreSQL connection (Render injects these automatically)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?connectTimeout=10&socketTimeout=30
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Schema patch disabled in prod — ddl-auto=update handles all columns via JPA entities
spring.sql.init.mode=never

# Disable H2 console in production
spring.h2.console.enabled=false

# Hide verbose error details in production
server.error.include-message=never
server.error.include-binding-errors=never

# Bind to port from Render's $PORT env var (default 8080)
server.port=${PORT:-8080}
