# Production profile — activated by SPRING_PROFILES_ACTIVE=prod (set in Dockerfile)
# Fly.io injects JDBC_DATABASE_URL as a ready-to-use JDBC connection string for Java apps.

# PostgreSQL via Fly.io Postgres
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Fly injects DATABASE_URL but for username/password use the parsed vars it also provides
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console in production
spring.h2.console.enabled=false

# Hide verbose error details in production
server.error.include-message=never
server.error.include-binding-errors=never
