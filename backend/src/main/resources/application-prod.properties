# Production profile — activated by SPRING_PROFILES_ACTIVE=prod
# Render.com injects individual Postgres env vars when you attach a database.

# PostgreSQL connection (Render injects these automatically)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Run schema patch AFTER Hibernate creates/updates tables
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-patch.sql
spring.jpa.defer-datasource-initialization=true

# Disable H2 console in production
spring.h2.console.enabled=false

# Hide verbose error details in production
server.error.include-message=never
server.error.include-binding-errors=never
