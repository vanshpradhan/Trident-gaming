server.port=8080

# H2 Database (persistent file-based, same semantics as SQLite)
spring.datasource.url=jdbc:h2:file:./trident-h2;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (dev only - disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Token secret (override with env var TOKEN_SECRET in production)
app.token.secret=${TOKEN_SECRET:change-me-in-production-use-a-long-random-string}
app.token.expiry-ms=86400000

# Allowed CORS origins (comma-separated)
app.cors.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000}

# Disable Spring Security auto-config (we handle auth manually)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Increase max request size to 100KB
spring.servlet.multipart.max-file-size=100KB
spring.servlet.multipart.max-request-size=100KB
server.tomcat.max-http-form-post-size=102400

# Logging
logging.level.com.trident=INFO
logging.level.org.springframework.web=WARN
