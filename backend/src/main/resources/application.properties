server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────────
# Local dev: H2 file-based (default when DATABASE_URL is not set)
# Production (Railway): DATABASE_URL is injected automatically by Railway
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./trident-h2;AUTO_SERVER=TRUE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# Dialect: auto-detected by Spring Boot / Hibernate from the JDBC URL.
# Do NOT hardcode — works for both H2 (local) and PostgreSQL (Railway).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Schema patch ──────────────────────────────────────────────────────────────
# Disabled: ddl-auto=update handles all columns via JPA entities (H2 doesn't support PG dollar-quoting)
spring.sql.init.mode=never

# ── H2 Console (dev only) ─────────────────────────────────────────────────────
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ── Auth tokens ───────────────────────────────────────────────────────────────
app.token.secret=${TOKEN_SECRET:change-me-in-production-use-a-long-random-string}
app.token.expiry-ms=86400000

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000}

# ── Security autoconfigure exclusion ─────────────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ── Upload limits ─────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100KB
spring.servlet.multipart.max-request-size=100KB
server.tomcat.max-http-form-post-size=102400

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.trident=INFO
logging.level.org.springframework.web=WARN

# ── Error details (safe to keep; no stack traces exposed) ─────────────────────
server.error.include-message=always
server.error.include-binding-errors=always
